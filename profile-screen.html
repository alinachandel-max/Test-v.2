    <main class="screen profile-page">
      <section class="profile-header" aria-label="Заголовок профиля">

      <section class="profile-hero-card" aria-label="Профиль пользователя">

            <span>Как выглядит мой профиль</span>

              </svg>
            </span>
          </button>
        </div>
