  <div class="app seller-cabinet-app">
    <main class="screen seller-cabinet-page" data-seller-cabinet-root>
      <section class="seller-cabinet-header">
        <div class="seller-cabinet-header__top">
          <h1 class="seller-cabinet-header__title">Мои объявления</h1>
        </div>

        <section class="seller-cabinet-banners banners" aria-label="Промо продавца">
          <div class="seller-cabinet-banners__row">
            <button class="seller-cabinet-banner" type="button" data-seller-sheet-open="services" aria-label="Продажи на BirBir">
              <img class="seller-cabinet-banner__image" src="assets/seller-cabinet/banner-sales.png" alt="50 000 000 сум Продажи на BirBir">
            </button>
            <button class="seller-cabinet-banner" type="button" data-seller-open-tooltip aria-label="Советы для продавца">
              <img class="seller-cabinet-banner__image" src="assets/seller-cabinet/banner-tips.png" alt="Советы для продавца">
            </button>
          </div>
        </section>

        <div class="seller-cabinet-tabs" data-seller-tabs aria-label="Вкладки объявлений"></div>
      </section>

      <section class="seller-cabinet-content" data-seller-content aria-live="polite"></section>
    </main>

    <div class="seller-cabinet-notification" data-seller-notification hidden aria-hidden="true"></div>

    <div class="filters-tooltip seller-cabinet-tooltip" data-seller-tooltip hidden aria-hidden="true">
      <button class="filters-tooltip__close" type="button" data-seller-tooltip-close aria-label="Закрыть подсказку">
        <span class="icon-box icon-box--8">
          <svg class="icon-svg" viewBox="0 0 8 8" aria-hidden="true">
            <use href="#icon-close"></use>
          </svg>
        </span>
      </button>
      <p class="filters-tooltip__text">Поднимайте объявления и включайте услуги, чтобы быстрее получать отклики.</p>
      <span class="filters-tooltip__pointer" aria-hidden="true"></span>
    </div>

    <div class="seller-cabinet-footer">
      <div class="seller-cabinet-footer__cta">
        <button class="library-button library-button--accent-filled" type="button" data-seller-primary-cta>
          <span class="library-button__label">+ Поставить объявление</span>
        </button>
      </div>

      <nav class="tabbar" aria-label="Основная навигация">
        <div class="tabbar__items">
          <a class="tabbar__item" href="birbir-home-screen.html">
            <span class="icon-box icon-box--24 icon-color--primary">
              <svg class="icon-svg icon--search" viewBox="0 0 24 24" aria-hidden="true">
                <use href="#icon-search"></use>
              </svg>
            </span>
            <span>Поиск</span>
          </a>
          <a class="tabbar__item" href="#">
            <span class="icon-box icon-box--24 icon-color--primary">
              <svg class="icon-svg icon--heart-empty" viewBox="0 0 24 24" aria-hidden="true">
                <use href="#icon-heart-empty"></use>
              </svg>
            </span>
            <span>Избранное</span>
          </a>
          <a class="tabbar__item tabbar__item--active" href="seller-cabinet-screen.html">
            <span class="icon-box icon-box--24 icon-color--active">
              <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
                <use href="#icon-add-circle-fill"></use>
              </svg>
            </span>
            <span>Продажа</span>
          </a>
          <a class="tabbar__item" href="#">
            <span class="icon-box icon-box--24 icon-color--primary">
              <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
                <use href="#icon-chat"></use>
              </svg>
            </span>
            <span>Сообщения</span>
          </a>
          <a class="tabbar__item" href="#">
            <span class="icon-box icon-box--24 icon-color--primary">
              <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
                <use href="#icon-user"></use>
              </svg>
            </span>
            <span>Профиль</span>
          </a>
        </div>
      </nav>
    </div>
  </div>

  <div class="filter-bottomsheet seller-bottomsheet" data-seller-bottomsheet aria-hidden="true">
    <div class="filter-bottomsheet__backdrop" data-seller-sheet-close></div>
    <div class="filter-bottomsheet__panel" role="dialog" aria-modal="true" aria-labelledby="seller-bottomsheet-title">
      <div class="filter-bottomsheet__header">
        <div class="filter-bottomsheet__title-row">
          <button class="filter-bottomsheet__reset seller-bottomsheet__ghost" type="button" data-seller-sheet-secondary hidden></button>
          <h2 class="filter-bottomsheet__title" id="seller-bottomsheet-title">Детали</h2>
          <button class="filter-bottomsheet__close" type="button" data-seller-sheet-close aria-label="Закрыть">
            <span class="icon-box icon-box--16" aria-hidden="true">
              <img class="seller-icon-img" src="prototype-library/icon-source-svg/Close.svg" alt="">
            </span>
          </button>
        </div>
      </div>
      <div class="filter-bottomsheet__list seller-bottomsheet__list" data-seller-sheet-content></div>
      <div class="filter-apply-bar seller-bottomsheet__footer">
        <div class="filter-apply-bar__inner">
          <button class="filter-apply-bar__button" type="button" data-seller-sheet-primary>Понятно</button>
        </div>
      </div>
    </div>
  </div>
